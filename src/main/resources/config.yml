# ============================================
# AntiElytraTarget Plugin Configuration
# ============================================

settings:
  max-violations: 5
  reset-seconds: 10
  warning-threshold: 3
  punishment-duration-seconds: 30
  ban-command: "tempbanip %player% 7d %reason%"
  ban-reason: "Elytra Target Cheat"
  debug: false

effects:
  lightning: false
  sound: true
  particle: false

discord:
  webhook-url: "YOUR_WEBHOOK_HERE"

messages:
  warning: "&c[!] &fVery Fast Slot Switching Detected! &7(%count%/%max%)"
  punishment: "&8[&cPunishment] &fYour PvP Ability Has Been Disabled! &7(%duration% sec)"
  punishment-ended: "&aYour punishment has ended."
  attack-blocked: "&cYou cannot attack! &7(%remaining% sec)"
  firework-blocked: "&cYou cannot use fireworks while gliding!"
  staff-warning: "&b%player% &fsuspected! &c[%count%/%max%]"
  no-permission: "&cNo permission!"
  reloaded: "&aConfig reloaded!"
  player-not-found: "&cPlayer not found!"
  data-cleared: "&aData cleared!"
  no-data: "&7No data"
  violation-info: "&eViolations: &c%violations%"
  last-switch: "&eLast switch: &7%ms% ms ago"
  punishment-active: "&cPunishment: %remaining%s"
  punishment-none: "&aNo punishment"
  punishment-finished: "&aPunishment finished"

commands:
  usage-status: "&cUsage: /aet status <player>"
  usage-clear: "&cUsage: /aet clear <player>"

help:
  header: "&6=== AntiElytraTarget ==="
  reload: "&e/aet reload &7- Reload config"
  status: "&e/aet status <player> &7- Show status"
  clear: "&e/aet clear <player> &7- Clear data"